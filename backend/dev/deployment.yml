apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-dev
  namespace: willcataco-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-dev
  template:
    metadata:
      labels:
        app: backend-dev
    spec:
      containers:
      - name: backend
        image: ghcr.io/willcataco-los-papus-y-sebas/willcataco-server:dev-b9081ce2b4132740c3a9706fa2d62f9bd403f277
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: backend-secrets-dev
        env:
        - name: DB_HOST
          value: postgres-dev
        - name: DB_PORT
          value: "5432"
        - name: ENVIRONMENT
          value: development
