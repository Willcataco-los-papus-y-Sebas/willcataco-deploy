apiVersion: apps/v1
kind: Deployment
metadata:
  name: willcataco-dev-frontend
  namespace: willcataco-dev
  labels:
    app: willcataco-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: willcataco-frontend
      environment: dev
  template:
    metadata:
      labels:
        app: willcataco-frontend
        environment: dev
    spec:
      containers:
        - name: willcataco-frontend
          image: ghcr.io/willcataco-los-papus-y-sebas/willcataco:dev-da3aef38f265ae14884734842a6f2ab81b43f06d
          ports:
            - containerPort: 80
