apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: willcataco-dev-frontend
  namespace: willcataco-dev
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  ingressClassName: nginx
  rules:
    - host: dev-willcataco.chakisoft.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: willcataco-dev-frontend
                port:
                  number: 80
